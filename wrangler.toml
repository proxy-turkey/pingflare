name = "pingflare"
main = "dist/_worker.js"
compatibility_date = "2025-11-17"
compatibility_flags = ["nodejs_compat"]

# Workers Static Assets
[assets]
directory = "dist"

# Observability & Logs Configuration
[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "pingflare-db"
database_id = "382d1e91-4ce8-43ea-a185-0a05ac128ecb"
migrations_dir = "migrations"

# Cron triggers - runs health checks every minute
[triggers]
crons = ["*/1 * * * *"]

# Environment variables
[vars]
ENVIRONMENT = "production"

# Required secrets (set via `wrangler secret put`):
# - CRON_SECRET: Random string to authenticate scheduled health checks
#   Generate with: openssl rand -hex 32
